apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: prometheus-scaled-object
  namespace: lab
  labels:
    app: prometheus-workload
spec:
  scaleTargetRef:
    name: prometheus-workload
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.prometheus.svc.cluster.local:9090
        query: sum(workload_queue_depth_simulation)
        threshold: "5"
        metricName: workload_queue_depth
