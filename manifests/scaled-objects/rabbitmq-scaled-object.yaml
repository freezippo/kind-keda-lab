apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rabbitmq-scaled-object
  namespace: lab
  labels:
    app: rabbitmq-consumer
spec:
  scaleTargetRef:
    name: rabbitmq-consumer
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: rabbitmq
      metadata:
        queueName: task-queue
        queueLength: "10"
        protocol: amqp
        host: amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672
