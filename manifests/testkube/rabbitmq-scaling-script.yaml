apiVersion: tests.testkube.io/v2
kind: Script
metadata:
  name: rabbitmq-scaling-test
  namespace: testkube
  labels:
    app: kind-keda-lab
    test-type: rabbitmq-scaling
spec:
  type: k6/script
  content:
    type: string
    data: |
      import http from 'k6/http';
      import { check, sleep } from 'k6';

      const WORKLOAD_URL = __ENV.WORKLOAD_URL || 'http://rabbitmq-consumer.lab.svc.cluster.local:8080';

      export const options = {
        stages: [
          { duration: '10s', target: 2 },
          { duration: '30s', target: 2 },
          { duration: '20s', target: 0 },
        ],
        thresholds: {
          'http_req_failed': ['rate<0.1'],
        },
      };

      export default function () {
        const payload = JSON.stringify({ count: 10, size: 256 });
        const res = http.post(`${WORKLOAD_URL}/produce`, payload, {
          headers: { 'Content-Type': 'application/json' },
          timeout: '10s',
        });
        check(res, { 'status is 200': (r) => r.status === 200 });
        sleep(0.5);
      }
