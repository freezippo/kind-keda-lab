kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: prometheus-scaling-test
  namespace: testkube
  labels:
    app: kind-keda-lab
    test-type: prometheus-scaling
spec:
  content:
    files:
      - path: /data/prometheus-test.js
        content: |
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          const WORKLOAD_URL = __ENV.WORKLOAD_URL || 'http://prometheus-workload.lab.svc.cluster.local:8080';

          export const options = {
            stages: [
              { duration: '15s', target: 10 },
              { duration: '60s', target: 10 },
              { duration: '15s', target: 0 },
            ],
            thresholds: {
              'http_req_duration': ['p(95)<5000'],
              'http_req_failed': ['rate<0.1'],
            },
          };

          export default function () {
            const res = http.get(`${WORKLOAD_URL}/metrics`, {
              timeout: '10s',
            });
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(0.1);
          }
  steps:
    - name: Run Prometheus Scaling Test
      workingDir: /data
      run:
        image: grafana/k6:0.49.0
        env:
          - name: WORKLOAD_URL
            value: "http://prometheus-workload.lab.svc.cluster.local:8080"
        args:
          - run
          - prometheus-test.js
