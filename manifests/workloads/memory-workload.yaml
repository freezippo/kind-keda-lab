apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-workload
  namespace: lab
  labels:
    app: memory-workload
    mode: memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-workload
  template:
    metadata:
      labels:
        app: memory-workload
        mode: memory
    spec:
      containers:
        - name: memory-workload
          image: kind-keda-lab-workload:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "memory"
            - name: MEMORY_LIMIT_MB
              value: "64"
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memory-workload
  namespace: lab
  labels:
    app: memory-workload
spec:
  selector:
    app: memory-workload
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
