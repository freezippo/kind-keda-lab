apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-workload
  namespace: lab
  labels:
    app: cpu-workload
    mode: cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-workload
  template:
    metadata:
      labels:
        app: cpu-workload
        mode: cpu
    spec:
      containers:
        - name: cpu-workload
          image: kind-keda-lab-workload:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "cpu"
            - name: LOAD_INTENSITY
              value: "50"
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-workload
  namespace: lab
  labels:
    app: cpu-workload
spec:
  selector:
    app: cpu-workload
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
