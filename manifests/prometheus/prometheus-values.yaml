# =============================================================================
# Prometheus Stack Helm Values — Kind-KEDA Lab Environment
# Minimal configuration for local lab use
# =============================================================================

# Disable Alertmanager for lab
alertmanager:
  enabled: false

# Minimal Grafana (no persistence)
grafana:
  enabled: true
  persistence:
    enabled: false
  adminUser: admin
  adminPassword: admin

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 2h
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      emptyDir: {}
    # Scrape interval
    scrapeInterval: 15s

    # Additional scrape configs for Python workload metrics
    additionalScrapeConfigs:
      - job_name: 'python-workload-metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - lab
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: .*-prometheus-workload

# kube-state-metrics
kubeStateMetrics:
  enabled: true

# Node exporter
nodeExporter:
  enabled: false

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: false
    configReloaders: false
    general: true
    k8s: true
    kubeApiserver: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: false
    kubeScheduler: false
    network: false
    node: true
    nodeExporterAlerting: false
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: false
